name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Desactivamos cache por ahora para evitar conflictos
          # cache: 'npm' 
      
      # Paso 1: Verificar que estamos en la carpeta correcta
      - name: List files in root
        run: ls -la
      
      - name: List files in client
        run: |
          cd client
          ls -la
      
      # Paso 2: Instalar dependencias
      - name: Install dependencies
        run: |
          cd client
          if [ -f "package.json" ]; then
            echo "package.json found. Installing..."
            npm install
          else
            echo "ERROR: package.json NOT found in client folder!"
            exit 1
          fi
      
      # Paso 3: Construir el proyecto
      - name: Build
        run: |
          cd client
          if [ -f "package.json" ]; then
            echo "Building project..."
            npm run build
          else
            echo "ERROR: Cannot build, package.json missing."
            exit 1
          fi
      
      # Paso 4: Verificar que se creó la carpeta dist
      - name: List files in client/dist
        run: |
          cd client
          if [ -d "dist" ]; then
            echo "dist folder found. Contents:"
            ls -la dist
          else
            echo "ERROR: dist folder NOT created!"
            exit 1
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
