name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd lizeth-garcia-portfolio/client
          npm install --legacy-peer-deps
      
      # CORRECCIÓN: Usamos --legacy-peer-deps también en el build
      - name: Build
        run: |
          cd lizeth-garcia-portfolio/client
          npm run build --legacy-peer-deps || npm run build -- --force
      
      # Verificación: ¿Se creó la carpeta dist?
      - name: Check dist folder
        run: |
          cd lizeth-garcia-portfolio/client
          if [ -d "dist" ]; then
            echo "Success: dist folder created."
            ls -la dist
          else
            echo "Error: dist folder NOT created!"
            echo "Attempting fallback build..."
            # Intento de fallback: construir sin plugins problemáticos
            npm install --legacy-peer-deps --no-optional
            npm run build -- --force || true
            if [ -d "dist" ]; then
              echo "Fallback successful."
            else
              echo "Fatal: Could not create dist folder."
              exit 1
            fi
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './lizeth-garcia-portfolio/client/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
